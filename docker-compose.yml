# Local Postgres for development. Tests do NOT need this (they use embedded-postgres),
# but it is the convenient local DB for running migrations + the app.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: valvetrade
    ports:
      - '5432:5432'
    volumes:
      - vt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d valvetrade']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vt_pgdata:
